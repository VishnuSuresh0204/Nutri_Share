{% extends "ADMIN/commen.html" %}

{% block title %}Send Notification - Admin{% endblock %}
{% block header_title %}Send System Notification{% endblock %}

{% block content %}
<div class="form-card">
    <h3 class="form-title">Broadcast Alert</h3>
    <p class="form-subtitle">Send general announcements, guidelines, or critical alerts to portal roles</p>
    
    <form action="/admin_send_notification/" method="POST">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="title">Notification Title</label>
            <input type="text" id="title" name="title" class="form-control" placeholder="Enter short, descriptive title" required>
        </div>
        
        <div class="form-group">
            <label for="target_role">Target Audience (Role)</label>
            <select id="target_role" name="target_role" class="form-control" required>
                <option value="" disabled selected>Select target role...</option>
                <option value="all">All Roles (Everyone)</option>
                <option value="donor">Donors Only</option>
                <option value="volunteer">Volunteers Only</option>
                <option value="user">Beneficiary Users Only</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="message">Detailed Announcement Message</label>
            <textarea id="message" name="message" class="form-control" style="min-height: 150px;" placeholder="Type the message body here..." required></textarea>
        </div>

        <button type="submit" class="btn btn-primary btn-block" style="margin-top: 1.5rem;">
            <i class="fa-solid fa-paper-plane"></i> Broadcast Message
        </button>
    </form>
</div>
{% endblock %}
