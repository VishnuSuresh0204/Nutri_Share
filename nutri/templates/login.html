{% extends "commen.html" %}

{% block title %}Login - NutriShare{% endblock %}

{% block content %}
<div class="form-card">
    <h2 class="form-title">Welcome Back</h2>
    <p class="form-subtitle">Login to access your NutriShare dashboard</p>
    
    <form action="/login/" method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label for="username">Username</label>
            <div style="position: relative;">
                <span style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-secondary-light);"><i class="fa-solid fa-user"></i></span>
                <input type="text" id="username" name="username" class="form-control" placeholder="Enter username" style="padding-left: 2.5rem;" required>
            </div>
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <div style="position: relative;">
                <span style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-secondary-light);"><i class="fa-solid fa-lock"></i></span>
                <input type="password" id="password" name="password" class="form-control" placeholder="Enter password" style="padding-left: 2.5rem;" required>
            </div>
        </div>
        
        <button type="submit" class="btn btn-primary btn-block" style="margin-top: 1.5rem;">
            <i class="fa-solid fa-right-to-bracket"></i> Login
        </button>
    </form>
    
    <div style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem; color: var(--text-secondary-light);">
        Don't have an account? <span style="font-weight: 600; color: var(--primary-color);">Register as:</span>
        <div style="margin-top: 0.5rem; display: flex; justify-content: center; gap: 1rem;">
            <a href="/register_user">User</a> |
            <a href="/register_donor">Donor</a> |
            <a href="/register_volunteer">Volunteer</a>
        </div>
    </div>
</div>
{% endblock %}
