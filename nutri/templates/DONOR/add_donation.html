{% extends "DONOR/commen.html" %}

{% block title %}Add Donation - Donor Portal{% endblock %}
{% block header_title %}Create New Donation Listing{% endblock %}

{% block content %}
<div class="form-card">
    <h3 class="form-title">Register Surplus Food</h3>
    <p class="form-subtitle">Provide details of the excess food items you wish to share.</p>
    
    <form action="/donor_add_donation/" method="POST">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="food_name">Food Item / Title</label>
            <input type="text" id="food_name" name="food_name" class="form-control" placeholder="e.g. Mixed Fruit Bowls, Fresh Bread Rolls" required>
        </div>
        
        <div class="form-group">
            <label for="food_type">Food Category / Type</label>
            <select id="food_type" name="food_type" class="form-control" required>
                <option value="" disabled selected>Select category...</option>
                <option value="Veg Meal">Veg Meal</option>
                <option value="Non-Veg Meal">Non-Veg Meal</option>
                <option value="Bakery / Dessert">Bakery / Dessert</option>
                <option value="Fruits / Vegetables">Fruits / Vegetables</option>
                <option value="Groceries / Shelf-stable">Groceries / Shelf-stable</option>
                <option value="Other">Other</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="quantity">Quantity / Servings</label>
            <input type="text" id="quantity" name="quantity" class="form-control" placeholder="e.g. 15 servings, 5 Kg" required>
        </div>
        
        <div class="form-group">
            <label for="expiry_time">Best Before / Expiry Time</label>
            <input type="datetime-local" id="expiry_time" name="expiry_time" class="form-control" required>
        </div>
        
        <div class="form-group">
            <label for="pickup_address">Pickup Address</label>
            <textarea id="pickup_address" name="pickup_address" class="form-control" placeholder="Address where the courier can collect items" required>{{ request.user.donorprofile_set.first.address }}</textarea>
        </div>
        
        <div class="form-group">
            <label for="description">Detailed Description</label>
            <textarea id="description" name="description" class="form-control" placeholder="Describe the item (e.g. packaged date, storage conditions like 'keep refrigerated', allergens if any)" required></textarea>
        </div>

        <button type="submit" class="btn btn-primary btn-block" style="margin-top: 1.5rem;">
            <i class="fa-solid fa-circle-plus"></i> List Food Donation
        </button>
    </form>
</div>
{% endblock %}
